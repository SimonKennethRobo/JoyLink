# ZMQ publisher configuration — no ROS2 dependency needed at runtime.
#
# Consumer example (Python):
#   import zmq, json
#   ctx = zmq.Context()
#   sock = ctx.socket(zmq.SUB)
#   sock.connect("tcp://localhost:5555")
#   sock.setsockopt_string(zmq.SUBSCRIBE, "")
#   while True:
#       topic, body = sock.recv_string(), sock.recv_string()
#       data = json.loads(body)
#       print(f"axes: {data['axes']}, buttons: {data['buttons']}")

joystick_server:
  device: "/dev/input/js0"
  device_name: ""

  deadzone: 0.05
  sticky_buttons: false
  publish_rate: 50.0
  coalesce_interval: 0.001
  frame_id: "joy"

  publisher_type: "zmq"

  ros2:
    topic: "joy"

  zmq:
    address: "tcp://*:5555"

  button_mapping:
    a: 0
    b: 1
    x: 2
    y: 3
    lb: 4
    rb: 5
    back: 6
    start: 7
    guide: 8
    left_stick: 9
    right_stick: 10

  axes_mapping:
    left_stick_x: 0
    left_stick_y: 1
    left_trigger: 2
    right_stick_x: 3
    right_stick_y: 4
    right_trigger: 5
    dpad_x: 6
    dpad_y: 7
