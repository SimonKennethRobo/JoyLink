joylink:
  device: "/dev/input/js0"
  device_name: ""

  deadzone: 0.05
  sticky_buttons: false
  publish_rate: 100.0
  coalesce_interval: 0.001
  frame_id: "joy"

  publisher_type: "zmq"

  ros2:
    topic: "joy"

  zmq:
    address: "tcp://*:5555"

  debug_raw: false

  button_mapping:
    a: 0
    b: 1
    x: 3
    y: 4
    lb: 6
    rb: 7
    left_stick: 13
    right_stick: 14
    touchpad: -1
    start: -1
    back: -1
    guide: -1

  axes_mapping:
    left_stick_x: 1
    left_stick_y: 0
    right_stick_x: 3
    right_stick_y: 2
    left_trigger: 5
    right_trigger: 4
    dpad_x: 6
    dpad_y: 7

  axis_reverse: [0, 1, 3]
